name: CI

on:
  push:
    paths:
      - 'AGENTS.md'
      - '.claudeignore'
      - 'agents/skills/**'
      - 'blocksy-child/**'
      - '.github/workflows/**'
      - 'scripts/**'
      - 'package.json'
      - 'package-lock.json'
      - 'composer.json'
      - 'composer.lock'
      - 'phpstan.neon'
      - 'phpstan-baseline.neon'
      - 'stubs/**'
  pull_request:
    paths:
      - 'AGENTS.md'
      - '.claudeignore'
      - 'agents/skills/**'
      - 'blocksy-child/**'
      - '.github/workflows/**'
      - 'scripts/**'
      - 'package.json'
      - 'package-lock.json'
      - 'composer.json'
      - 'composer.lock'
      - 'phpstan.neon'
      - 'phpstan-baseline.neon'
      - 'stubs/**'
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine diff refs
        id: refs
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "base=${{ github.event.pull_request.base.sha }}" >> "$GITHUB_OUTPUT"
            echo "head=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          elif [[ -n "${{ github.event.before }}" && "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]]; then
            echo "base=${{ github.event.before }}" >> "$GITHUB_OUTPUT"
            echo "head=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "base=$(git rev-list --max-parents=0 HEAD | tail -n 1)" >> "$GITHUB_OUTPUT"
            echo "head=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate GitHub Actions workflows
        uses: devops-actions/actionlint@v0.1.11

      - name: Validate repository architecture
        run: bash scripts/validate-architecture.sh

      - name: Check canon drift
        run: bash scripts/lint-canon-drift.sh "${{ steps.refs.outputs.base }}" "${{ steps.refs.outputs.head }}"

      - name: Check E3 canon
        run: bash scripts/lint-e3-canon.sh

      - name: Check visible German copy
        run: bash scripts/check-german-copy.sh "${{ steps.refs.outputs.base }}" "${{ steps.refs.outputs.head }}"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Node build tooling
        run: npm ci

      - name: PHP syntax check
        run: find blocksy-child -name '*.php' -print0 | xargs -0 -n1 php -l

      - name: Install PHP analysis tooling
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: PHP static analysis
        run: composer analyse:php

      - name: Validate deploy config fallback
        run: bash scripts/verify-deploy-config.sh 22 "www/wp-content/themes/blocksy-child/"

      - name: Build theme distribution
        run: npm run build:theme -- .build/blocksy-child

      - name: Verify built style.css keeps the theme header
        run: |
          grep -q '^Theme Name: Blocksy Child$' .build/blocksy-child/style.css
